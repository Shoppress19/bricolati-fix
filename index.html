<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الواجهة الرسمية</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--main-green); text-align: center; }
        .video-box { background: #000; border-radius: 20px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .btn-main { background: var(--main-green); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; margin-top: 20px; }
        .legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .legal-item { background: #f9f9f9; padding: 10px; border-radius: 10px; font-size: 12px; color: #3498db; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛠️ Bricolati Fix</h1>
        <p style="color:#888; font-size:12px;">المرجع المستقل للمراجعات والتقنية</p>
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
        </div>
        <a href="blog.html" class="btn-main">دخول المدونة 🚀</a>
        <div class="legal-grid">
            <div class="legal-item">🛡️ الخصوصية</div>
            <div class="legal-item">⚖️ الشروط</div>
            <div class="legal-item">⚠️ إخلاء المسؤولية</div>
            <div class="legal-item">🍪 الكوكيز</div>
        </div>
    </div>
</body>
</html>
