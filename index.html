<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | المرجع القانوني</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 20px; padding: 20px; border-top: 10px solid #2ecc71; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .video { background: #000; border-radius: 15px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; }
        .video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .post { text-align: right; border-right: 5px solid #2ecc71; padding-right: 12px; margin-bottom: 25px; }
        .btn-green { background: #2ecc71; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .legal-item { background: #f9f9f9; padding: 12px; border-radius: 10px; font-size: 12px; color: #3498db; border: 1px solid #ddd; cursor: pointer; }
        /* نافذة التفاصيل */
        #popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .popup-box { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:#2c3e50; margin:0;">Bricolati Fix 🛠️</h1>
    <p style="color:#888; font-size:12px;">المرجع المستقل للمراجعات والتقنية</p>

    <div class="video">
        <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
    </div>

    <div class="post">
        <h2 style="font-size:18px; color:#2c3e50;">انطلاق الواجهة القانونية</h2>
        <p style="font-size:13px; color:#555; line-height:1.6;">نقدم لك أدق المراجعات للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية الدقيقة.</p>
    </div>

    <button class="btn-green" onclick="alert('تم نسخ بيانات SEO بنجاح!')">نسخ بيانات SEO الواجهة 📋</button>

    <div class="legal-grid">
        <div class="legal-item" onclick="show('p')">🛡️ الخصوصية</div>
        <div class="legal-item" onclick="show('t')">⚖️ الشروط</div>
        <div class="legal-item" onclick="show('d')">⚠️ إخلاء المسؤولية</div>
        <div class="legal-item" onclick="show('c')">🍪 الكوكيز</div>
    </div>
    
    <p style="font-size:10px; color:#ccc; margin-top:20px;">© 2026 Bricolati Fix | Shoppress19</p>
</div>

<div id="popup" onclick="this.style.display='none'">
    <div class="popup-box" onclick="event.stopPropagation()">
        <h3 id="p-title" style="color:#2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; margin-top:0;"></h3>
        <p id="p-body" style="font-size:13px; color:#444; line-height:1.7;"></p>
        <button class="btn-green" onclick="document.getElementById('popup').style.display='none'">إغلاق</button>
    </div>
</div>

<script>
    const info = {
        p: ["سياسة الخصوصية", "نحن لا نجمع أي بيانات شخصية. تصفحك آمن تماماً، والبيانات التقنية تستخدم فقط لتحسين تجربة المستخدم المرجعية."],
        t: ["الشروط والأحكام", "المحتوى مخصص للأغراض التعليمية. يمنع نسخ المراجعات دون ذكر المصدر الرسمي Bricolati Fix."],
        d: ["إخلاء المسؤولية", "هذا الموقع مرجع مستقل. الروابط المنشورة لـ AliExpress قد تكون روابط تابعة تمنحنا عمولة بسيطة لدعم استمرار المراجعات."],
        c: ["ملفات الكوكيز", "نستخدم الكوكيز لتحسين سرعة الموقع وتحليل حركة الزوار بشكل مجهول الهوية لضمان جودة المحتوى."]
    };

    function show(id) {
        document.getElementById('p-title').innerText = info[id][0];
        document.getElementById('p-body').innerText = info[id][1];
        document.getElementById('popup').style.display = 'flex';
    }
</script>

</body>
</html>
