<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الدليل المرجعي الذكي</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; --soft-gray: #f8f9fa; }
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; border-top: 8px solid var(--main-green); }
        
        /* شريط البحث */
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; box-sizing: border-box; font-size: 14px; outline: none; }
        .search-box:focus { border-color: var(--main-green); }

        /* بطاقة المنتج */
        .product-card { display: flex; align-items: center; border: 1px solid #eee; padding: 12px; border-radius: 12px; background: var(--soft-gray); margin-bottom: 15px; text-align: right; transition: 0.3s; text-decoration: none; color: inherit; }
        .product-card:hover { transform: scale(1.02); border-color: var(--main-green); }
        .product-img { width: 60px; height: 60px; border-radius: 8px; background: #eee; margin-left: 15px; }
        .product-info h4 { margin: 0; font-size: 15px; color: var(--dark-blue); }
        .product-info p { margin: 5px 0; font-size: 12px; color: #7f8c8d; }

        footer { margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; font-size: 11px; color: #95a5a6; }
        .legal-link { cursor: pointer; color: #3498db; margin: 0 5px; }

        /* إخفاء المنتجات التي لا تطابق البحث */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-size: 24px; color: var(--dark-blue);">Bricolati Fix 🛠️</h1>
    <p style="font-size: 13px; color: #7f8c8d;">ابحث عن الأدوات والإصلاحات المرجعية</p>

    <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن أداة (مثلاً: مفك، ليزر)..." onkeyup="filterProducts()">

    <div id="productList">
        <a href="#" class="product-card" data-name="مفك براغي دقة">
            <div class="product-img">🛠️</div>
            <div class="product-info">
                <h4>طقم مفكات Bricolati</h4>
                <p>لإصلاح الإلكترونيات الدقيقة.</p>
            </div>
        </a>

        <a href="#" class="product-card" data-name="ميزان ليزر حرارة">
            <div class="product-img">🌡️</div>
            <div class="product-info">
                <h4>ميزان حرارة ليزري</h4>
                <p>قياس احترافي فوري.</p>
            </div>
        </a>

        <a href="#" class="product-card" data-name="كماشة أسلاك">
            <div class="product-img">✂️</div>
            <div class="product-info">
                <h4>كماشة قطع احترافية</h4>
                <p>أداة قوية للأعمال الكهربائية.</p>
            </div>
        </a>
    </div>

    <footer>
        <span class="legal-link" onclick="alert('سياسة الخصوصية: لا نجمع بياناتك.')">الخصوصية</span> | 
        <span class="legal-link" onclick="alert('إخلاء المسؤولية: مرجع تقني مستقل.')">إخلاء المسؤولية</span>
        <p>© 2026 Bricolati - Shoppress19</p>
    </footer>
</div>

<script>
    function filterProducts() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('product-card');

        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getAttribute('data-name');
            if (name.toLowerCase().includes(input)) {
                cards[i].classList.remove('hidden');
            } else {
                cards[i].classList.add('hidden');
            }
        }
    }
</script>

</body>
</html>
