<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | التفاصيل القانونية</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--main-green); text-align: center; }
        .header h1 { color: var(--dark-blue); font-size: 28px; margin: 10px 0; }
        .video-container { background: #000; border-radius: 20px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .post-body { text-align: right; border-right: 5px solid var(--main-green); padding-right: 15px; margin-bottom: 25px; }
        .btn-seo { background: var(--main-green); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 30px; }
        .legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid #eee; padding-top: 20px; }
        .legal-btn { background: #f9f9f9; padding: 12px; border-radius: 10px; font-size: 12px; color: #3498db; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .legal-btn:hover { background: #f0f0f0; }
        /* نظام النافذة المنبثقة التفصيلية */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: right; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-text { font-size: 13px; color: #444; line-height: 1.8; max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Bricolati Fix 🛠️</h1>
        <p style="color:#888; font-size:12px;">المرجع المستقل للمراجعات والتقنية</p>
    </div>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
    </div>

    <div class="post-body">
        <h2 style="font-size:20px; color:var(--dark-blue);">انطلاق الواجهة القانونية</h2>
        <p style="font-size:14px; color:#555;">نقدم لك مراجعات دقيقة للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية.</p>
    </div>

    <button class="btn-seo" onclick="alert('تم نسخ بيانات SEO بنجاح!')">نسخ بيانات SEO الواجهة 📋</button>

    <div class="legal-grid">
        <div class="legal-btn" onclick="openL('p')">🛡️ الخصوصية</div>
        <div class="legal-btn" onclick="openL('t')">⚖️ الشروط</div>
        <div class="legal-btn" onclick="openL('d')">⚠️ إخلاء المسؤولية</div>
        <div class="legal-btn" onclick="openL('c')">🍪 الكوكيز</div>
    </div>
    
    <p style="font-size: 10px; color: #ccc; margin-top: 20px;">Bricolati Fix | Shoppress19 2026 ©</p>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 id="m-title" style="color:var(--dark-blue); border-bottom: 2px solid var(--main-green); padding-bottom: 10px;"></h3>
        <div id="m-body" class="modal-text"></div>
        <button class="btn-seo" onclick="document.getElementById('modal').style.display='none'">إغلاق وقبول</button>
    </div>
</div>

<script>
    const content = {
        p: { title: "سياسة الخصوصية", body: "نلتزم في Bricolati بحماية بياناتك. نحن لا نجمع أي معلومات شخصية بشكل مباشر، وأي بيانات تصفح يتم التعامل معها بشكل مجهول لتحسين أداء المدونة المرجعية." },
        t: { title: "الشروط والأحكام", body: "استخدامك لهذا الموقع يعني موافقتك على القواعد. المحتوى مخصص للأغراض التعليمية ومراجعة أدوات AliExpress بموضوعية تامة. يمنع نسخ المحتوى دون ذكر المصدر." },
        d: { title: "إخلاء المسؤولية", body: "هذا الموقع هو مرجع مستقل. الروابط المنشورة قد تكون روابط تابعة (Affiliate)، مما يعني أننا قد نحصل على عمولة بسيطة عند الشراء لدعم استمرارية المراجعات التقنية دون أي زيادة في السعر عليك." },
        c: { title: "ملفات الكوكيز", body: "نستخدم ملفات تعريف الارتباط لتحليل حركة الزوار وتوفير تجربة تصفح سلسة. يمكنك التحكم في هذه الإعدادات من خلال متصفحك الخاص في أي وقت." }
    };

    function openL(id) {
        document.getElementById('m-title').innerText = content[id].title;
        document.getElementById('m-body').innerText = content[id].body;
        document.getElementById('modal').style.display = 'flex';
    }
</script>

</body>
</html>
