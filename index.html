<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bricolati Fix | الواجهة القانونية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f5 100%);
            font-family: 'Segoe UI', 'Tahoma', system-ui, 'Cairo', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* البطاقة الرئيسية - أنيقة وبسيطة مثل التصميم المطلوب */
        .card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 2px rgba(0, 0, 0, 0.02);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        /* الترويسة */
        .header {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1f2e3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
        }

        .header .sub {
            color: #5f6c7a;
            font-size: 0.9rem;
            font-weight: 500;
            border-top: 1px solid #e9edf2;
            display: inline-block;
            padding-top: 8px;
        }

        /* خط التاريخ والكاتب */
        .meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 1rem 0 1.8rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 0.85rem;
            color: #4a5b6e;
        }

        .date {
            font-weight: 600;
            background: #f0f4f9;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
        }

        .author {
            font-weight: 500;
            color: #2c3e50;
            letter-spacing: -0.2px;
        }

        /* المحتوى الأساسي */
        .content {
            margin: 1.8rem 0 2rem 0;
        }

        .content h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1f2e3a;
            border-right: 5px solid #2ecc71;
            padding-right: 1rem;
            margin-bottom: 1.2rem;
        }

        .content p {
            font-size: 1rem;
            line-height: 1.7;
            color: #2d3e4f;
            margin-bottom: 0.5rem;
        }

        /* الزر الرئيسي */
        .btn-seo {
            background: #2ecc71;
            border: none;
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(46, 204, 113, 0.3);
            font-family: inherit;
        }

        .btn-seo:hover {
            background: #27ae60;
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        /* رسالة منبثقة (toast) */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a36e6;
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 2000;
            white-space: nowrap;
            animation: fadeUpOut 2.2s forwards;
            pointer-events: none;
        }

        @keyframes fadeUpOut {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(15px);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
                visibility: hidden;
            }
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 550px) {
            .card {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .content h2 {
                font-size: 1.4rem;
            }
            .meta {
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🛠️ Bricolati Fix</h1>
        <div class="sub">المرجع المستقل للمراجعات والتقنية</div>
    </div>

    <!-- معلومات التاريخ والكاتب كما في الصورة -->
    <div class="meta">
        <span class="date">📅 February 19, 2026</span>
        <span class="author">✍️ bricolatipro</span>
    </div>

    <div class="content">
        <h2>انطلاق الواجهة القانونية</h2>
        <p>نقدم لك أدق المراجعات للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية الدقيقة.</p>
    </div>

    <button class="btn-seo" id="copySeoBtn">
        📋 نسخ بيانات SEO الواجهة
    </button>
</div>

<script>
    (function() {
        // محتوى SEO مطابق لروح الموقع ومحسّن للنسخ
        const seoContent = `Bricolati Fix | المرجع المستقل للمراجعات التقنية - واجهة قانونية شفافة. نقدم مراجعات دقيقة للأدوات التقنية مع الالتزام بمعايير البيانات والمصداقية. الكلمات المفتاحية: مراجعات تقنية، Bricolati Fix، أدوات تقنية، شفافية قانونية، تقييمات موثوقة. تاريخ النشر: February 19, 2026.`;

        // دالة عرض رسالة短暂ة
        function showToast(message) {
            // إزالة أي توست قديم
            const oldToast = document.querySelector('.toast-message');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerText = message;
            document.body.appendChild(toast);

            // إزالة تلقائياً بعد انتهاء الأنيميشن
            setTimeout(() => {
                if (toast && toast.parentNode) toast.remove();
            }, 2200);
        }

        // دالة النسخ الأساسية (تدعم Clipboard API والـ fallback)
        async function copySEO() {
            try {
                await navigator.clipboard.writeText(seoContent);
                showToast("✅ تم نسخ بيانات SEO بنجاح! يمكنك استخدامها في وصف الموقع.");
            } catch (err) {
                // Fallback للأجهزة القديمة أو البيئات غير الآمنة
                const textArea = document.createElement('textarea');
                textArea.value = seoContent;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast("📋 تم نسخ البيانات (طريقة احتياطية)");
            }
        }

        const copyButton = document.getElementById('copySeoBtn');
        if (copyButton) {
            copyButton.addEventListener('click', copySEO);
        }

        // إضافة تأثير بسيط للزر (اختياري)
        console.log("✅ واجهة Bricolati Fix القانونية جاهزة - تصميم مطابق للصورة");
    })();
</script>
</body>
</html>
