<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | المرجع الرسمي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f4f9fc 0%, #e9f0f5 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 1.5rem;
        }

        .card {
            max-width: 550px; width: 100%; background: #ffffff;
            border-radius: 2.5rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            padding: 2rem; border: 1px solid rgba(46, 204, 113, 0.2);
            text-align: center; position: relative;
        }

        .header h1 { font-size: 2.2rem; font-weight: 800; color: #2c3e50; margin-bottom: 5px; }
        .sub { color: #5f6c7a; font-size: 0.9rem; border-top: 1px solid #eee; display: inline-block; padding-top: 5px; margin-bottom: 15px; }

        /* قسم التاريخ والكاتب الجديد */
        .meta-info { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 20px; }
        .date-tag { background: #f0f4fa; padding: 5px 15px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; color: #3a4c62; }
        .author-tag { font-size: 0.9rem; color: #2c3e50; font-weight: 500; }

        /* مشغل الفيديو */
        .video-box {
            background: #000; border-radius: 1.5rem; overflow: hidden;
            position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* المحتوى */
        .content { text-align: right; border-right: 5px solid #2ecc71; padding-right: 1rem; margin-bottom: 25px; }
        .content h2 { font-size: 1.6rem; color: #1f2e3a; margin-bottom: 8px; }
        .content p { font-size: 1rem; color: #444; line-height: 1.7; }

        /* زر SEO */
        .btn-seo {
            background: #2ecc71; color: white; border: none; width: 100%;
            padding: 1.1rem; border-radius: 50px; font-weight: 700; cursor: pointer;
            transition: 0.3s; box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3); font-size: 1rem;
        }
        .btn-seo:hover { transform: scale(0.98); background: #27ae60; }

        /* شبكة الروابط القانونية */
        .legal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;
        }
        .legal-item {
            background: #f9f9f9; padding: 12px; border-radius: 12px;
            font-size: 0.85rem; color: #3498db; cursor: pointer;
            border: 1px solid #eee; transition: 0.2s;
        }
        .legal-item:hover { background: #f0f0f0; }

        /* النافذة المنبثقة */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
            z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-card { background: white; padding: 2rem; border-radius: 2rem; width: 100%; max-width: 400px; text-align: right; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Bricolati Fix 🛠️</h1>
        <div class="sub">المرجع المستقل للمراجعات والتقنية</div>
    </div>

    <div class="meta-info">
        <span class="date-tag">📅 February 19, 20
