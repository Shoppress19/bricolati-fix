<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الواجهة الرسمية</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 420px; border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-top: 10px solid var(--main-green); }
        .logo h1 { color: var(--dark-blue); font-size: 28px; margin-bottom: 5px; }
        .video-box { background: #000; border-radius: 20px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; margin: 20px 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .btn-main { background: var(--main-green); color: white; display: block; padding: 16px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 18px; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .legal-item { background: #f9f9f9; padding: 10px; border-radius: 12px; font-size: 12px; color: #3498db; border: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🛠️ Bricolati Fix</h1>
            <p style="color:#888; font-size:13px;">المرجع المستقل للمراجعات والتقنية</p>
        </div>
        
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
        </div>

        <a href="blog.html" class="btn-main">دخول المدونة 🚀</a>

        <div class="legal-grid">
            <div class="legal-item">🛡️ الخصوصية</div>
            <div class="legal-item">⚖️ الشروط</div>
            <div class="legal-item">⚠️ إخلاء المسؤولية</div>
            <div class="legal-item">🍪 الكوكيز</div>
        </div>
        <p style="font-size: 10px; color: #ccc; margin-top: 20px;">Bricolati Fix | 2026 ©</p>
    </div>
</body>
</html>
