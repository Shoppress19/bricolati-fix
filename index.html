<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | المرجع التقني</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; --bg: #f4f7f6; }
        
        body { background-color: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        
        .container { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; width: 100%; 
            border-top: 8px solid var(--main-green); animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { text-align: center; margin-bottom: 25px; }
        .logo { font-size: 26px; font-weight: bold; color: var(--dark-blue); margin: 0; }

        .video-box { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 25px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .blog-post { text-align: right; border-right: 4px solid var(--main-green); padding-right: 15px; margin-bottom: 30px; }
        
        .save-btn { 
            background: var(--main-green); color: white; border: none; padding: 12px; border-radius: 12px; 
            cursor: pointer; width: 100%; font-weight: bold; font-size: 15px; transition: 0.3s;
        }
        .save-btn:hover { background: #27ae60; transform: scale(1.02); }

        /* الفوتر القانوني */
        footer { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; text-align: center; }
        .legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .legal-link { font-size: 11px; color: #3498db; cursor: pointer; padding: 8px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; transition: 0.2s; }
        .legal-link:hover { background: #eee; }

        /* نافذة المعلومات (Modal) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; max-width: 400px; width: 90%; text-align: right; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-body { font-size: 13px; color: #444; line-height: 1.7; max-height: 300px; overflow-y: auto; margin: 15px 0; border-top: 1px solid #eee; padding-top: 10px; }
        .close-btn { background: var(--main-green); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">Bricolati Fix 🛠️</div>
        <p style="color: #888; font-size: 12px;">المرجع المستقل للمراجعات والتقنية</p>
    </header>

    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
    </div>

    <article class="blog-post">
        <h3 style="margin: 0; color: var(--dark-blue);">انطلاق الواجهة القانونية والتفاعلية</h3>
        <p style="font-size: 14px; color: #555; line-height: 1.6;">
            نحن هنا لنقدم لك أدق المراجعات للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية الدقيقة.
        </p>
        <button class="save-btn" onclick="copySEO()">نسخ بيانات SEO الواجهة 📋</button>
    </article>

    <footer>
        <div class="legal-grid">
            <span class="legal-link" onclick="openM('privacy')">🛡️ الخصوصية</span>
            <span class="legal-link" onclick="openM('terms')">⚖️ الشروط</span>
            <span class="legal-link" onclick="openM('cookies')">🍪 الكوكيز</span>
            <span class="legal-link" onclick="openM('disclaimer')">⚠️ إخلاء المسؤولية</span>
        </div>
        <p style="font-size: 10px; color: #bdc3c7;">© 2026 Bricolati Fix | Shoppress19</p>
    </footer>
</div>

<div id="legalModal" class="modal-overlay" onclick="closeM()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="m-title" style="color: var(--dark-blue); margin: 0;"></h3>
        <div id="m-body" class="modal-body"></div>
        <button class="close-btn" onclick="closeM()">إغلاق وقبول</button>
    </div>
</div>

<script>
    const legalContent = {
        privacy: { title: "سياسة الخصوصية", body: "نحن في Bricolati لا نجمع أي بيانات شخصية. تصفحك مشفر وآمن تماماً، والروابط الخارجية تتبع سياسات أصحابها." },
        terms: { title: "الشروط والأحكام", body: "المحتوى مخصص للأغراض التعليمية. يمنع إعادة نشر المحتوى دون ذكر المصدر الرسمي Bricolati Fix." },
        cookies: { title: "ملفات الكوكيز", body: "نستخدم ملفات تعريف ارتباط بسيطة لتحسين الأداء وتحليل حركة المرور مجهولة الهوية لخدمتكم بشكل أفضل." },
        disclaimer: { title: "إخلاء المسؤولية (Affiliate)", body: "المراجعات تعبر عن تجربة شخصية. نستخدم روابط تابعة لـ AliExpress قد تمنحنا عمولة بسيطة لدعم الموقع دون تكلفة إضافية عليك." }
    };

    function openM(id) {
        document.getElementById('m-title').innerText = legalContent[id].title;
        document.getElementById('m-body').innerText = legalContent[id].body;
        document.getElementById('legalModal').style.display = 'flex';
    }

    function closeM() { document.getElementById('legalModal').style.display = 'none'; }

    function copySEO() {
        const txt = "الوسوم: Bricolati, AliExpress, إصلاحات\nالوصف: مرجع مراجعات أدوات AliExpress الاحترافي.";
        navigator.clipboard.writeText(txt).then(() => alert("تم نسخ بيانات SEO بنجاح!"));
    }
</script>

</body>
</html>
