<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Blog | المراجعات</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .blog-container { max-width: 500px; margin: 0 auto; }
        .post-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .video-thumb { background: #000; border-radius: 15px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 15px; }
        .video-thumb iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .post-title { font-size: 1.4rem; color: #2c3e50; border-right: 5px solid #2ecc71; padding-right: 10px; margin-bottom: 10px; }
        .btn-view { background: #2ecc71; color: white; display: block; text-align: center; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-bottom: 10px; }
        .btn-seo { background: #34495e; color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="blog-container">
        <h2 style="text-align: center; margin-bottom: 20px;">أحدث المراجعات التقنية 🛠️</h2>
        
        <article class="post-card">
            <div class="video-thumb">
                <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
            </div>
            <h2 class="post-title">مراجعة مفك البراغي الكهربائي</h2>
            <p style="font-size: 0.9rem; color: #555; margin-bottom: 15px;">فحص دقيق للأداء والمواصفات من AliExpress.</p>
            <a href="#" class="btn-view">مشاهدة المراجعة الكاملة 📋</a>
            <button class="btn-seo">نسخ بيانات SEO 🏷️</button>
        </article>
    </div>
</body>
</html>
