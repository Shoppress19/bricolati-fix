    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--main-green); text-align: center; }

        /* نافذة المعلومات المنبثقة */
        #legalModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: right; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .modal-body { font-size: 13px; color: #444; line-height: 1.8; max-height: 350px; overflow-y: auto; margin: 15px 0; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
