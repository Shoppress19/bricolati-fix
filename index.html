<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الواجهة القانونية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #f4f9fc 0%, #e9f0f5 100%);
            font-family: 'Segoe UI', 'Tahoma', system-ui, 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* البطاقة الرئيسية */
        .card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            padding: 2rem 2rem 2.5rem;
            transition: all 0.2s;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        /* الهيدر */
        .header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #1f2e3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .header .sub {
            color: #5f6c7a;
            font-size: 0.9rem;
            font-weight: 500;
            border-top: 1px solid #eef2f6;
            display: inline-block;
            padding-top: 6px;
        }

        /* معلومات التاريخ والكاتب */
        .meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin: 1rem 0 1.5rem 0;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #eef2f6;
            font-size: 0.85rem;
            color: #3a4c62;
        }

        .date {
            font-weight: 600;
            background: #f0f4fa;
            padding: 0.25rem 1rem;
            border-radius: 40px;
        }

        .author {
            font-weight: 500;
            color: #2c3e50;
        }

        /* المحتوى النصي */
        .content {
            margin: 1.8rem 0 2rem 0;
        }

        .content h2 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1f2e3a;
            border-right: 5px solid #2ecc71;
            padding-right: 1rem;
            margin-bottom: 1rem;
        }

        .content p {
            font-size: 1rem;
            line-height: 1.7;
            color: #2d3e4f;
            margin-bottom: 0.5rem;
        }

        /* زر النسخ */
        .btn-seo {
            background: #2ecc71;
            border: none;
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 14px rgba(46, 204, 113, 0.3);
            font-family: inherit;
        }

        .btn-seo:hover {
            background: #27ae60;
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        /* رسالة منبثقة */
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a36e6;
            backdrop-filter: blur(12px);
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 2000;
            white-space: nowrap;
            animation: fadeUpOut 2.2s forwards;
            pointer-events: none;
        }

        @keyframes fadeUpOut {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(15px);
            }
            15% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            85% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-10px);
                visibility: hidden;
            }
        }

        /* استجابة للشاشات الصغيرة */
        @media (max-width: 550px) {
            .card {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
            .content h2 {
                font-size: 1.4rem;
            }
            .meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🛠️ Bricolati Fix</h1>
        <div class="sub">المرجع المستقل للمراجعات والتقنية</div>
    </div>

    <div class="meta">
        <span class="date">📅 February 19, 2026</span>
        <span class="author">✍️ bricolatipro</span>
    </div>

    <div class="content">
        <h2>انطلاق الواجهة القانونية</h2>
        <p>نقدم لك أدق المراجعات للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية الدقيقة.</p>
    </div>

    <button class="btn-seo" id="copySeoBtn">
        📋 نسخ بيانات SEO الواجهة
    </button>
</div>

<script>
    (function() {
        // نص SEO المحسن (يمكن تعديله حسب الرغبة)
        const seoContent = `Bricolati Fix | المرجع المستقل للمراجعات والتقنية. نقدم مراجعات دقيقة للأدوات التقنية مع الالتزام بالشفافية القانونية والبيانات المرجعية الدقيقة. الكلمات المفتاحية: مراجعات تقنية، أدوات تقنية، Bricolati Fix، واجهة قانونية. تاريخ النشر: February 19, 2026.`;

        // دالة عرض الإشعار
        function showToast(message) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.innerText = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                if (toast && toast.parentNode) toast.remove();
            }, 2300);
        }

        // دالة النسخ (تدعم Clipboard API و fallback)
        async function copySEO() {
            try {
                await navigator.clipboard.writeText(seoContent);
                showToast("✅ تم نسخ بيانات SEO بنجاح!");
            } catch (err) {
                // الطريقة الاحتياطية
                const textArea = document.createElement('textarea');
                textArea.value = seoContent;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast("📋 تم نسخ البيانات (طريقة احتياطية)");
            }
        }

        const copyBtn = document.getElementById('copySeoBtn');
        if (copyBtn) {
            copyBtn.addEventListener('click', copySEO);
        }
    })();
</script>
</body>
</html>
