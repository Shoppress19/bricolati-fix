<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الواجهة الرسمية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #f4f9fc 0%, #e9f0f5 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 1.5rem;
        }

        .card {
            max-width: 500px; width: 100%; background: #ffffff;
            border-radius: 2rem; box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            padding: 2rem; border: 1px solid rgba(46, 204, 113, 0.2);
            text-align: center;
        }

        .header h1 { font-size: 2rem; color: #2c3e50; margin-bottom: 0.5rem; }
        .sub { color: #5f6c7a; font-size: 0.85rem; border-top: 1px solid #eee; padding-top: 5px; }

        /* مشغل الفيديو */
        .video-box {
            background: #000; border-radius: 1.5rem; overflow: hidden;
            position: relative; padding-bottom: 56.25%; height: 0; margin: 1.5rem 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .content { text-align: right; border-right: 5px solid #2ecc71; padding-right: 1rem; margin-bottom: 1.5rem; }
        .content h2 { font-size: 1.4rem; color: #1f2e3a; margin-bottom: 0.5rem; }
        .content p { font-size: 0.95rem; color: #444; line-height: 1.6; }

        .btn-seo {
            background: #2ecc71; color: white; border: none; width: 100%;
            padding: 1rem; border-radius: 50px; font-weight: 700; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        .btn-seo:hover { background: #27ae60; transform: translateY(-2px); }

        /* شبكة الروابط القانونية */
        .legal-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-top: 1.5rem; border-top: 1px solid #eee; padding-top: 1.5rem;
        }
        .legal-item {
            background: #f8f9fa; padding: 12px; border-radius: 12px;
            font-size: 0.8rem; color: #3498db; cursor: pointer;
            border: 1px solid #edf2f7; font-weight: 600;
        }
        .legal-item:hover { background: #edf2f7; }

        /* نافذة المعلومات (Modal) */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-box {
            background: white; padding: 2rem; border-radius: 1.5rem;
            width: 100%; max-width: 400px; text-align: right;
        }
        .modal-body { font-size: 0.9rem; line-height: 1.7; color: #555; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🛠️ Bricolati Fix</h1>
        <div class="sub">المرجع المستقل للمراجعات والتقنية</div>
    </div>

    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
    </div>

    <div class="content">
        <h2>انطلاق الواجهة القانونية</h2>
        <p>نقدم لك أدق المراجعات للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية الدقيقة.</p>
    </div>

    <button class="btn-seo" onclick="copySEO()">📋 نسخ بيانات SEO الواجهة</button>

    <div class="legal-grid">
        <div class="legal-item" onclick="openModal('p')">🛡️ الخصوصية</div>
        <div class="legal-item" onclick="openModal('t')">⚖️ الشروط</div>
        <div class="legal-item" onclick="openModal('d')">⚠️ إخلاء المسؤولية</div>
        <div class="legal-item" onclick="openModal('c')">🍪 الكوكيز</div>
    </div>
</div>

<div id="modal" onclick="this.style.display='none'">
    <div class="modal-box" onclick="event.stopPropagation()">
        <h3 id="m-title" style="color:#2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 8px;"></h3>
        <div id="m-body" class="modal-body"></div>
        <button class="btn-seo" onclick="document.getElementById('modal').style.display='none'">إغلاق</button>
    </div>
</div>

<script>
    const legalData = {
        p: { title: "سياسة الخصوصية", body: "نحن في Bricolati لا نجمع أي بيانات شخصية. تصفحك مشفر وآمن تماماً، والروابط الخارجية تتبع سياسات أصحابها." },
        t: { title: "الشروط والأحكام", body: "المحتوى مخصص للأغراض التعليمية. يمنع إعادة نشر المراجعات دون ذكر المصدر الرسمي Bricolati Fix." },
        d: { title: "إخلاء المسؤولية", body: "الموقع مرجع مستقل. روابط AliExpress قد تكون روابط تابعة تمنحنا عمولة بسيطة لدعم الموقع دون زيادة في السعر عليك." },
        c: { title: "سياسة الكوكيز", body: "نستخدم ملفات كوكيز تقنية بسيطة لضمان سرعة تحميل الموقع وتوفير تجربة تصفح سلسة." }
    };

    function openModal(id) {
        document.getElementById('m-title').innerText = legalData[id].title;
        document.getElementById('m-body').innerText = legalData[id].body;
        document.getElementById('modal').style.display = 'flex';
    }

    function copySEO() {
        const text = "SEO: Bricolati Fix - المرجع التقني لمراجعات AliExpress الموثوقة.";
        navigator.clipboard.writeText(text).then(() => alert("✅ تم نسخ بيانات SEO بنجاح!"));
    }
</script>

</body>
</html>
