<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | المراجعات التقنية</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; color: var(--dark-blue); }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        
        /* الواجهة الرئيسية */
        .card { background: white; border-radius: 30px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 10px solid var(--main-green); margin-bottom: 30px; }
        
        /* بطاقة المراجعة */
        .post-card { background: white; border-radius: 20px; padding: 15px; text-align: right; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; }
        .video-box { background: #000; border-radius: 15px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .btn-go { background: var(--main-green); color: white; display: inline-block; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>🛠️ Bricolati Fix</h1>
            <p>المرجع المستقل للمراجعات والتقنية</p>
        </div>

        <div class="post-card">
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
            </div>
            <h2 style="font-size: 1.2rem; margin: 15px 0 5px;">مراجعة مفك البراغي الكهربائي</h2>
            <p style="font-size: 0.9rem; color: #666;">فحص الأداء والمميزات من AliExpress.</p>
            <a href="https://s.click.aliexpress.com/e/_DChvH3v" class="btn-go">عرض المنتج على AliExpress 🛒</a>
        </div>
        
        <p style="font-size: 10px; color: #ccc; margin-top: 40px;">Bricolati Fix | 2026 ©</p>
    </div>

</body>
</html>
