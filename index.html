<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الواجهة القانونية</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; width: 100%; max-width: 450px; border-radius: 25px; padding: 25px; border-top: 10px solid var(--main-green); box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; position: relative; }
        .header h1 { color: var(--dark-blue); font-size: 28px; margin: 10px 0 5px 0; }
        .video-box { background: #000; border-radius: 20px; overflow: hidden; position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 25px; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .content { text-align: right; border-right: 5px solid var(--main-green); padding-right: 15px; margin-bottom: 30px; }
        .btn-seo { background: var(--main-green); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-seo:hover { opacity: 0.9; transform: scale(0.98); }
        .legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .legal-item { background: #f9f9f9; padding: 12px; border-radius: 10px; font-size: 12px; color: #3498db; cursor: pointer; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 5px; }
        /* Modal Style */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: right; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-body { font-size: 13px; color: #444; line-height: 1.8; max-height: 300px; overflow-y: auto; margin: 15px 0; padding-top: 10px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>🛠️ Bricolati Fix</h1>
        <p style="color:#888; font-size:12px;">المرجع المستقل للمراجعات والتقنية</p>
    </div>

    <div class="video-box">
        <iframe src="https://www.youtube.com/embed/Z2WxRGYfjeU" allowfullscreen></iframe>
    </div>

    <div class="content">
        <h2 style="font-size:19px; color:var(--dark-blue); margin:0 0 10px 0;">انطلاق الواجهة القانونية</h2>
        <p style="font-size:13.5px; color:#555; line-height:1.6;">نقدم لك أدق المراجعات للأدوات التقنية مع التزام كامل بالشفافية القانونية والبيانات المرجعية الدقيقة.</p>
    </div>
