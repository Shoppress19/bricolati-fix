<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bricolati Fix | الرئيسية</title>
    <style>
        :root { --main-green: #2ecc71; --dark-blue: #2c3e50; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; border-radius: 30px; padding: 35px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border-top: 10px solid var(--main-green); }
        .logo h1 { color: var(--dark-blue); margin-bottom: 10px; font-size: 28px; }
        .btn-enter { background: var(--main-green); color: white; display: block; padding: 18px; margin-top: 25px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 18px; transition: 0.3s; }
        .btn-enter:hover { background: #27ae60; transform: scale(1.02); }
        .footer-text { font-size: 11px; color: #bbb; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>🛠️ Bricolati Fix</h1>
            <p style="color:#666; font-size:14px;">المرجع المستقل للمراجعات والتقنية</p>
        </div>
        
        <a href="blog.html" class="btn-enter">دخول المدونة 🚀</a>

        <p class="footer-text">Bricolati Fix | 2026 ©</p>
    </div>
</body>
</html>
